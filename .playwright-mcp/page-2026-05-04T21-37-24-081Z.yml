        - generic [ref=e124]: On-Site Diagnosis
        - generic [ref=e125]: A technician arrives in a 2-hour window, inspects the fridge, and identifies the root cause. We check everything before recommending any parts.
      - generic [ref=e126]:
        - generic [ref=e127]: "3"
        - generic [ref=e128]: Upfront Quote
        - generic [ref=e129]: You get a clear quote before we touch anything. No surprise charges. If you decide not to proceed, you pay nothing beyond the service call fee.
      - generic [ref=e130]:
        - generic [ref=e131]: "4"
        - generic [ref=e132]: Repair & Warranty
        - generic [ref=e133]: Most repairs are finished the same day. Every repair is covered by our parts and labor warranty — if the same issue comes back, we return at no charge.
