  - generic [ref=e71]:
    - heading "Brands We Repair" [level=2] [ref=e72]
    - paragraph [ref=e73]: We service every major brand — from everyday workhorses to high-end built-ins.
    - generic [ref=e74]:
      - generic [ref=e75]:
        - generic [ref=e76]: Samsung
        - generic [ref=e77]: Ice maker failures and cooling issues in French-door models are the most frequent calls we get. Samsung's ice maker module is a known weak point — we carry the common replacement parts.
      - generic [ref=e78]:
        - generic [ref=e79]: LG
        - generic [ref=e80]: LG linear compressors in French-door models fail earlier than expected in OC's climate. We also frequently repair the drain line in the freezer drawer, which ices over and causes water to pool under the crisper.
      - generic [ref=e81]:
        - generic [ref=e82]: Sub-Zero
        - generic [ref=e83]: Sub-Zero's sealed-system repairs (compressor, condenser, evaporator) require experience with high-end units. Clogged drain tubes causing water under the bottom drawer are the most common call we receive.
      - generic [ref=e84]:
        - generic [ref=e85]: Whirlpool
        - generic [ref=e86]: Whirlpool fridges are among the most reliable, but thermostat and ice maker issues do come up. Control board replacements are also common in older Whirlpool French-door units.
      - generic [ref=e87]:
        - generic [ref=e88]: GE & GE Profile
        - generic [ref=e89]: GE ice maker modules and defrost heaters are the repairs we see most often. GE Profile units can develop control board issues after several years — we diagnose before recommending a board swap.
      - generic [ref=e90]:
        - generic [ref=e91]: Frigidaire
        - generic [ref=e92]: Frigidaire compressors and door gaskets are the most common service requests. Older Gallery and Professional series models sometimes develop electronic control failures that look like a dead unit but are an easy fix.
      - generic [ref=e93]:
        - generic [ref=e94]: KitchenAid
        - generic [ref=e95]: KitchenAid built-in and counter-depth fridges frequently need water inlet valve replacements and ice dispenser motor repairs. We work on all KitchenAid configurations including French door and side-by-side.
      - generic [ref=e96]:
        - generic [ref=e97]: Bosch
        - generic [ref=e98]: Bosch refrigerators tend to be reliable, but evaporator fan motor failures and control board issues do occur. We service all Bosch 800 and Benchmark series configurations.
      - generic [ref=e99]:
        - generic [ref=e100]: Maytag
        - generic [ref=e101]: Maytag defrost timers and condenser fans wear out over time. Ice maker problems in Maytag side-by-side units are also common — most are resolved in a single visit.
      - generic [ref=e102]:
        - generic [ref=e103]: Viking
        - generic [ref=e104]: Viking professional refrigerators occasionally develop sealed-system and temperature control issues. We service Viking built-in column and French-door units throughout Orange County.
  - generic [ref=e106]:
    - heading "Repair or Replace?" [level=2] [ref=e107]
    - paragraph [ref=e108]: You don't have to figure this out alone. Here's the honest rule of thumb we share with every customer before we start any work.
    - paragraph [ref=e110]:
      - strong [ref=e111]: "The 10-year / 50% rule:"
      - text: If your refrigerator is under 10 years old and the repair cost is less than half the price of a comparable new unit, repair is almost always the right call. A new fridge has a 1–2 year delivery window right now — your food can't wait that long, and the repair is usually done same-day.
    - paragraph [ref=e112]: For high-end brands — Sub-Zero, Viking, Thermador — the economics lean even more toward repair. A new unit costs 3–6× what a repair does, and well-maintained premium fridges regularly last 20+ years. We'll tell you exactly what's wrong and give you the information to make the call yourself.
